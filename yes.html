<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Yes</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="celebration-page">
    <canvas class="confetti-canvas" id="confettiCanvas" aria-hidden="true"></canvas>
    <main class="celebration-screen">
      <section class="celebration">
        <p class="eyebrow">She said yes</p>
        <h1>YAYYY SHE SAID YES!</h1>

        <div class="ring-stage" aria-label="Cartoon party ring">
          <span class="burst burst-one" aria-hidden="true"></span>
          <span class="burst burst-two" aria-hidden="true"></span>
          <div class="party-ring" aria-hidden="true">
            <span class="diamond"></span>
            <span class="band"></span>
            <span class="shine shine-one"></span>
            <span class="shine shine-two"></span>
            <span class="shine shine-three"></span>
          </div>
        </div>

        <p class="note">I'm so happy it's you, Elifsu.</p>
        <div class="buttons">
          <button class="button yes-button" id="partyButton" type="button">Start party</button>
          <a class="button quiet-button" href="index.html">Back</a>
        </div>
      </section>
    </main>
    <script src="celebration.js"></script>
  </body>
</html>
