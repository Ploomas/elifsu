<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Yes</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="celebration-page">
    <canvas class="confetti-canvas" id="confettiCanvas" aria-hidden="true"></canvas>
    <main class="celebration-screen">
      <section class="celebration">
        <p class="eyebrow">She said yes</p>
        <h1>YAYYY SHE SAID YES!</h1>

        <div class="ring-stage" aria-label="Party rose face">
          <span class="burst burst-one" aria-hidden="true"></span>
          <span class="burst burst-two" aria-hidden="true"></span>
          <span class="floating-heart heart-one" aria-hidden="true">&hearts;</span>
          <span class="floating-heart heart-two" aria-hidden="true">&hearts;</span>
          <span class="floating-heart heart-three" aria-hidden="true">&hearts;</span>
          <span class="floating-heart heart-four" aria-hidden="true">&hearts;</span>
          <img class="party-image" src="assets/rose-face-cutout.png" alt="Smiling face holding a rose">
          <span class="shine shine-one" aria-hidden="true"></span>
          <span class="shine shine-two" aria-hidden="true"></span>
          <span class="shine shine-three" aria-hidden="true"></span>
        </div>

        <p class="note">I love you so much, Elifsu. You make my whole world brighter.</p>
        <div class="buttons">
          <button class="button yes-button" id="partyButton" type="button">Start party</button>
          <a class="button quiet-button" href="index.html">Back</a>
        </div>
        <audio class="sound-player" id="soundPlayer" src="assets/wow-sound-effect.mp3" preload="auto"></audio>
      </section>
    </main>
    <script src="celebration.js"></script>
  </body>
</html>
